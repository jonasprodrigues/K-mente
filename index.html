<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Mente - Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .question {
            margin-bottom: 20px;
        }
        
        .question p {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .answers {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .answer-btn {
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .answer-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .answer-btn.selected {
            background: #667eea;
            color: white;
        }
        
        .answer-btn.correct {
            background: #4caf50;
            border-color: #4caf50;
            color: white;
        }
        
        .answer-btn.incorrect {
            background: #f44336;
            border-color: #f44336;
            color: white;
        }
        
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 10px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .btn-prev {
            background: #ccc;
            color: #333;
        }
        
        .btn-prev:hover:not(:disabled) {
            background: #999;
        }
        
        .btn-next {
            background: #667eea;
            color: white;
            flex: 1;
        }
        
        .btn-next:hover:not(:disabled) {
            background: #5568d3;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress {
            text-align: center;
            color: #999;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .result {
            text-align: center;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .result h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .result p {
            color: #666;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>K-Mente - Quiz</h1>
        <div class="progress">
            <span id="current-question">1</span> / <span id="total-questions">0</span>
        </div>
        
        <div id="quiz-container">
            <div class="question">
                <p id="question-text"></p>
                <div class="answers" id="answers-container"></div>
            </div>
        </div>
        
        <div class="navigation">
            <button class="btn-prev" id="btn-prev" onclick="previousQuestion()">← Anterior</button>
            <button class="btn-next" id="btn-next" onclick="nextQuestion()">Próxima →</button>
        </div>
        
        <div id="result-container"></div>
    </div>
    
    <script>
        let quizData = [];
        let currentQuestionIndex = 0;
        let selectedAnswers = [];
        let layer = 1;
        
        async function loadQuiz() {
            try {
                const response = await fetch(`${layer}.json`);
                quizData = await response.json();
                selectedAnswers = new Array(quizData.length).fill(null);
                document.getElementById('total-questions').textContent = quizData.length;
                displayQuestion();
            } catch (error) {
                console.error('Erro ao carregar o quiz:', error);
                document.getElementById('quiz-container').innerHTML = '<p>Erro ao carregar o quiz</p>';
            }
        }
        
        function displayQuestion() {
            const question = quizData[currentQuestionIndex];
            document.getElementById('question-text').textContent = question.pergunta;
            document.getElementById('current-question').textContent = currentQuestionIndex + 1;
            
            const answersContainer = document.getElementById('answers-container');
            answersContainer.innerHTML = '';
            
            question.respostas.forEach((resposta, index) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = resposta;
                btn.onclick = () => selectAnswer(index);
                
                if (selectedAnswers[currentQuestionIndex] === index) {
                    btn.classList.add('selected');
                }
                
                answersContainer.appendChild(btn);
            });
            
            updateNavigationButtons();
        }
        
        function selectAnswer(index) {
            selectedAnswers[currentQuestionIndex] = index;
            displayQuestion();
        }
        
        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                displayQuestion();
            } else {
                showResults();
            }
        }
        
        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuestion();
            }
        }
        
        function updateNavigationButtons() {
            document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
            const btnNext = document.getElementById('btn-next');
            if (currentQuestionIndex === quizData.length - 1) {
                btnNext.textContent = 'Finalizar';
            } else {
                btnNext.textContent = 'Próxima →';
            }
        }
        
        function showResults() {
            let correctCount = 0;
            quizData.forEach((question, index) => {
                if (selectedAnswers[index] === question.resposta_correta) {
                    correctCount++;
                }
            });
            
            const percentage = Math.round((correctCount / quizData.length) * 100);
            const resultContainer = document.getElementById('result-container');
            resultContainer.innerHTML = `
                <div class="result">
                    <h2>Quiz Finalizado!</h2>
                    <p>Você acertou <strong>${correctCount}</strong> de <strong>${quizData.length}</strong> perguntas</p>
                    <p>Pontuação: <strong>${percentage}%</strong></p>
                    <button onclick="location.reload()" style="margin-top: 15px; background: #667eea; color: white; padding: 10px 20px;">Recomeçar</button>
                </div>
            `;
            document.getElementById('quiz-container').style.display = 'none';
            document.querySelector('.navigation').style.display = 'none';
        }
        
        loadQuiz();
    </script>
</body>
</html>
